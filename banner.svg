<svg width="1200" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a202c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d3748;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bgGradient)"/>
  
  <!-- Accent line -->
  <rect width="1200" height="4" y="120" fill="url(#accentGradient)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="50" r="40" fill="#667eea" opacity="0.2"/>
  <circle cx="1100" cy="250" r="50" fill="#764ba2" opacity="0.2"/>
  
  <!-- Main heading -->
  <text x="600" y="85" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#ffffff" text-anchor="middle">
    Minh Tuyến
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="160" font-family="Arial, sans-serif" font-size="24" fill="#cbd5e0" text-anchor="middle" font-weight="500">
    Java Backend Developer • BA/BrSE
  </text>
  
  <!-- Tagline -->
  <text x="600" y="210" font-family="Arial, sans-serif" font-size="16" fill="#a0aec0" text-anchor="middle">
    Building Solutions that Bridge Business &amp; Technology
  </text>
</svg>